apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default, the template uses the Blue Box preset: https://reactnative.dev/docs/next/the-new-architecture/setup
 */

react {
    /**
     * Set the JS engine to use. Choices are "hermes", "v8", and "jsc".
     * The "default" value will use Hermes on Android 10+ and JSC on older versions.
     */
    jsEngine = "hermes"

    /**
     * Enable the New Architecture if not already enabled by default.
     * We may want to opt-in explicitly here.
     * We may also want to opt-out of the New Architecture altogether.
     * The defaults will use the New Architecture if available.
     */
    newArchEnabled = false

    /**
     * Use the international variant of JavaScriptCore.
     *
     * This option is ignored on other JavaScript engines.
     */
    enableIntlSupport = false
}

android {
    compileSdkVersion rootProject.ext.compileSdkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion

    namespace "com.roadguard.mobile"

    defaultConfig {
        applicationId "com.roadguard.mobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", "false"
        missingDimensionStrategy 'store', 'play'
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('MYAPP_RELEASE_STORE_FILE')) {
                storeFile file(MYAPP_RELEASE_STORE_FILE)
                storePassword MYAPP_RELEASE_STORE_PASSWORD
                keyAlias MYAPP_RELEASE_KEY_ALIAS
                keyPassword MYAPP_RELEASE_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            debuggable true
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        pickFirst '**/armeabi-v7a/libc++_shared.so'
        pickFirst '**/x86/libc++_shared.so'
        pickFirst '**/arm64-v8a/libc++_shared.so'
        pickFirst '**/x86_64/libc++_shared.so'
    }
}

dependencies {
    // React Native and Core
    implementation "androidx.annotation:annotation:1.6.0"
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "androidx.core:core:1.12.0"
    implementation "androidx.fragment:fragment:1.6.2"
    implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.1.0"
    implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.1.0"
    implementation "androidx.work:work-runtime:2.8.1"
    implementation "com.facebook.fresco:fresco:3.0.0"
    implementation "com.facebook.fresco:animated-gif:3.0.0"
    implementation "com.facebook.fresco:animated-webp:3.0.0"
    implementation "com.facebook.fresco:webpsupport:3.0.0"
    implementation "com.facebook.react:react-android"

    // Firebase (optional, for background notifications)
    // implementation "com.google.firebase:firebase-messaging:23.2.1"

    // Local Database
    implementation "androidx.sqlite:sqlite:2.3.1"

    // Permissions
    implementation "androidx.activity:activity:1.7.2"

    // HTTP Client
    implementation "com.squareup.okhttp3:okhttp:4.10.0"

    debugImplementation "com.facebook.react:react-native-community_logs:2.8.1"
}

apply plugin: "com.android.application"

// Set this to build version numbers for use in build.gradle files
project.ext.react = [
    compileSdkVersion   : 34,
    targetSdkVersion    : 34,
    buildToolsVersion   : "34.0.0",
    minSdkVersion       : 21,
    ndkVersion          : "25.2.9519653"
]

subprojects {
    afterEvaluate {project ->
        if (project.hasProperty("android")) {
            android {
                compileSdkVersion rootProject.ext.compileSdkVersion
                buildToolsVersion rootProject.ext.buildToolsVersion
            }
        }
    }
}
