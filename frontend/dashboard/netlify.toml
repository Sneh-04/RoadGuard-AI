[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 5173

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { VITE_API_BASE = "https://your-backend-api.com" }

[context.deploy-preview]
  environment = { VITE_API_BASE = "https://staging-api.com" }

[context.branch-deploy]
  environment = { VITE_API_BASE = "http://localhost:8000" }
